<!-- ── Contact Messages View ── -->
<div id="contact-view">
    <div class="section-header">
        <div class="section-title" style="font-size:1.5rem;">
            <i class="fas fa-envelope" style="color:#3b82f6;margin-right:0.5rem;"></i> Contact Us Messages
        </div>
    </div>
    <div class="card">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Category</th>
                        <th>Message</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="contactBody">
                    <!-- Contact messages will be populated here -->
                </tbody>
            </table>
        </div>
    </div>
</div>
