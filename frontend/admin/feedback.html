<!-- ── Feedback View ── -->
<div id="feedback-view">
    <div class="section-header">
        <div class="section-title" style="font-size:1.5rem;">
            <i class="fas fa-comment-dots" style="color:#8b5cf6;margin-right:0.5rem;"></i> Feedback
        </div>
    </div>
    <div class="card">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Citizen</th>
                        <th>Complaint</th>
                        <th>Rating</th>
                        <th>Comment</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="feedbackBody">
                    <!-- Feedback will be populated here -->
                </tbody>
            </table>
        </div>
    </div>
</div>
