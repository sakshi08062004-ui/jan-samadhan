<!-- ── Analytics View ── -->
<div id="analytics-view">
    <div class="section-header">
        <div class="section-title" style="font-size:1.5rem;"><i class="fas fa-chart-line" style="color:#06b6d4; margin-right:0.5rem;"></i>Analytics</div>
    </div>
    <div class="analytics-wrapper">
        <div class="analytics-grid-2">
            <div class="analysis-card">
                <h3>Department Distribution</h3>
                <canvas id="deptDistributionChart"></canvas>
                <div class="analysis-legend" id="deptLegend"></div>
            </div>
            <div class="analysis-card">
                <h3>Status Breakdown</h3>
                <canvas id="statusDistributionChart"></canvas>
                <div class="analysis-legend" id="statusLegend"></div>
            </div>
        </div>
        <div class="analytics-grid-priority">
            <div class="analysis-card">
                <h3>Priority Analysis</h3>
                <canvas id="priorityAnalysisChart"></canvas>
                <div class="analysis-legend" id="priorityLegend"></div>
            </div>
        </div>
    </div>
</div>
