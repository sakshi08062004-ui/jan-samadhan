<!-- ── Admin Login Screen ── -->
<div id="login-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #1e3a8a 0%, #1e1b4b 100%); display: flex; align-items: center; justify-content: center; z-index: 1000;">
    <div class="login-card" style="background: rgba(255,255,255,0.95); padding: 2.5rem; border-radius: 1.5rem; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; backdrop-filter: blur(10px);">
        <div class="shield-icon" style="font-size: 3.5rem; color: #1e3a8a; margin-bottom: 1rem; background: #e0f2fe; width: 80px; height: 80px; line-height: 80px; border-radius: 1rem; margin-left: auto; margin-right: auto;">
            <i class="fas fa-shield-halved"></i>
        </div>
        <h1 style="color: #1e1b4b; font-weight: 700; margin-bottom: 2rem; font-size: 1.75rem;">Admin Login</h1>
        <form id="login-form">
            <div class="input-group" style="position: relative; margin-bottom: 1.5rem;">
                <i class="fas fa-user" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #64748b;"></i>
                <input type="text" id="username" placeholder="admin" required style="width: 100%; padding: 0.875rem 1rem 0.875rem 2.8rem; border: 2px solid #e2e8f0; border-radius: 0.75rem; outline: none; transition: all 0.2s; font-size: 1rem;">
            </div>
            <div class="input-group" style="position: relative; margin-bottom: 1.5rem;">
                <i class="fas fa-lock" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #64748b;"></i>
                <input type="password" id="password" placeholder="••••••••" required style="width: 100%; padding: 0.875rem 1rem 0.875rem 2.8rem; border: 2px solid #e2e8f0; border-radius: 0.75rem; outline: none; transition: all 0.2s; font-size: 1rem;">
            </div>
            <button type="submit" class="login-btn" style="width: 100%; padding: 1rem; background: #2563eb; color: white; border: none; border-radius: 0.75rem; font-weight: 600; font-size: 1rem; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
    </div>
</div>
