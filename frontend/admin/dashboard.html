<!-- ── Dashboard View ── -->
<div id="dashboard-view">
    <div class="stats-grid">
        <div class="stat-card">
            <i class="fas fa-clipboard-list color-total"></i>
            <div class="stat-value" id="stat-total-complaints">0</div>
            <div class="stat-label">Total Complaints</div>
        </div>
        <div class="stat-card">
            <i class="fas fa-clock color-pending"></i>
            <div class="stat-value" id="stat-pending">0</div>
            <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card">
            <i class="fas fa-tools color-resolving"></i>
            <div class="stat-value" id="stat-resolved">0</div>
            <div class="stat-label">Resolved</div>
        </div>
        <div class="stat-card">
            <i class="fas fa-users color-users"></i>
            <div class="stat-value" id="stat-total-users">0</div>
            <div class="stat-label">Total Users</div>
        </div>
        <div class="stat-card">
            <i class="fas fa-envelope color-contact"></i>
            <div class="stat-value" id="stat-total-messages">0</div>
            <div class="stat-label">Contact Us</div>
        </div>
    </div>
    <div class="graph-container">
        <canvas id="dashboardMainChart"></canvas>
    </div>
</div>
