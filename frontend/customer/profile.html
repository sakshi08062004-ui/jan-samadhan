<!-- ── Profile Section ── -->
<section id="profile" class="py-5 content-section" style="display:none;">
    <div class="container d-flex justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="card border-0 shadow-sm"
                style="border-radius: 12px; border-top: 4px solid #00C9FF !important;">
                <div class="card-body p-3 p-md-4">
                    <div class="d-flex flex-column align-items-center mb-3 text-center">
                        <div class="bg-light rounded-circle d-inline-flex align-items-center justify-content-center mb-2"
                            style="width: 80px; height: 80px; font-size: 2rem; color: #00C9FF;">
                            <i class="fas fa-user"></i>
                        </div>
                        <h4 class="mb-1" id="profileUsernameMain">Username</h4>
                        <p class="text-muted mb-2" id="profileEmailMain">email@example.com</p>
                        <button class="btn btn-primary text-white px-4 rounded-pill py-1 fw-bold"
                            id="editProfileBtn" onclick="editProfile()">
                            <i class="fas fa-edit me-2"></i>Edit My Profile
                        </button>
                    </div>
                    <hr>
                    <form id="profileForm">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control bg-light border-0" id="profileFullName" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control bg-light border-0" id="profileUsernameEdit"
                                readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control bg-light border-0" id="profileEmailEdit"
                                readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" class="form-control bg-light border-0" id="profilePhone" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Address</label>
                            <input type="text" class="form-control bg-light border-0" id="profileAddress" readonly>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
