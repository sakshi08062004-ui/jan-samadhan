<!-- ── Feedback Page Section ── -->
<section id="feedback-page" class="py-5 content-section" style="display:none;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-lg">
                    <div class="card-header text-center">
                        <h4><i class="fas fa-comment-alt me-2"></i>Share Your Feedback</h4>
                    </div>
                    <div class="card-body">
                        <form id="generalFeedbackForm">
                            <div class="mb-4 text-center">
                                <label class="form-label d-block mb-3">Rate Your Experience</label>
                                <div id="generalStarRating" class="d-flex justify-content-center gap-2">
                                    <i class="far fa-star fa-2x text-warning" style="cursor: pointer;"
                                        data-rating="1"></i>
                                    <i class="far fa-star fa-2x text-warning" style="cursor: pointer;"
                                        data-rating="2"></i>
                                    <i class="far fa-star fa-2x text-warning" style="cursor: pointer;"
                                        data-rating="3"></i>
                                    <i class="far fa-star fa-2x text-warning" style="cursor: pointer;"
                                        data-rating="4"></i>
                                    <i class="far fa-star fa-2x text-warning" style="cursor: pointer;"
                                        data-rating="5"></i>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Your Feedback *</label>
                                <textarea class="form-control" id="generalFeedbackComment" rows="5" required
                                    placeholder="Please share your experience with JAN SAMADHAN..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-paper-plane me-2"></i>Submit Feedback
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
